name: Apply frozen narrative delivery patch

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: frozen-narrative-delivery-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'agent/frozen-narrative-delivery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/frozen-narrative-delivery
          fetch-depth: 0

      - name: Apply focused runtime patch
        id: apply_patch
        shell: bash
        run: |
          set +e
          git apply --recount --reject --whitespace=fix .github/patches/frozen-narrative-delivery.patch 2>&1 | tee /tmp/narrative-patch.log
          apply_status=${PIPESTATUS[0]}
          if [ "$apply_status" -ne 0 ]; then
            echo "--- rejected hunks ---"
            find . -name '*.rej' -print -exec sh -c 'echo "===== $1 ====="; cat "$1"' _ {} \;
            exit "$apply_status"
          fi

      - name: Commit reject diagnostics
        if: failure()
        shell: bash
        run: |
          {
            echo "Patch application log:"
            cat /tmp/narrative-patch.log || true
            echo
            echo "Rejected hunks:"
            find . -name '*.rej' -print -exec sh -c 'echo "===== $1 ====="; cat "$1"' _ {} \;
          } > .github/patches/frozen-narrative-rejects.txt
          git checkout -- supabase/functions/online-runtime-tick/index.ts || true
          find . -name '*.rej' -delete
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/patches/frozen-narrative-rejects.txt
          git commit -m "Capture narrative patch rejects"
          git push origin HEAD:agent/frozen-narrative-delivery

      - name: Validate classifier and patch
        run: |
          npm run test:narrative
          node --check supabase/functions/_shared/narrative_moment.js
          git diff --check

      - name: Commit generated implementation
        run: |
          rm .github/patches/frozen-narrative-delivery.patch
          rm .github/workflows/apply-frozen-narrative-delivery.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Freeze narrative context and classify late delivery"
          git push origin HEAD:agent/frozen-narrative-delivery
