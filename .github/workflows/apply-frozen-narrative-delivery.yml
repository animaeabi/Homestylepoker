name: Apply frozen narrative delivery patch

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: frozen-narrative-delivery-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'agent/frozen-narrative-delivery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/frozen-narrative-delivery
          fetch-depth: 0

      - name: Apply runtime patch and deterministic fixups
        shell: bash
        run: |
          set +e
          git apply --recount --reject --whitespace=fix .github/patches/frozen-narrative-delivery.patch
          set -e
          node scripts/fix_narrative_runtime_rejects.mjs
          find . -name '*.rej' -delete

      - name: Validate classifier and runtime integration
        run: |
          npm run test:narrative
          node --check supabase/functions/_shared/narrative_moment.js
          git diff --check
          grep -q 'freezeNarrativeMoment' supabase/functions/online-runtime-tick/index.ts
          grep -q 'deliveryMode === "memory_only"' supabase/functions/online-runtime-tick/index.ts
          grep -q 'moment: settleMoment' supabase/functions/online-runtime-tick/index.ts

      - name: Commit generated implementation
        run: |
          rm .github/patches/frozen-narrative-delivery.patch
          rm .github/patches/frozen-narrative-rejects.txt
          rm scripts/fix_narrative_runtime_rejects.mjs
          rm .github/workflows/apply-frozen-narrative-delivery.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Freeze narrative context and classify late delivery"
          git push origin HEAD:agent/frozen-narrative-delivery
