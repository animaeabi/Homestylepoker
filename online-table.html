          transform: var(--held-transform) !important;
          margin-left: -6px !important;
        }

        .my-hand-area {
          grid-row: auto;
          display: flex !important;
          width: auto;
          padding: 0;
          gap: 10px;
          margin-top: 0;
          position: absolute;
          left: 50%;
          bottom: 14px;
          transform: translateX(-50%);
          z-index: 18;
          justify-content: center;
          align-items: flex-end;
          align-self: end;
        }

        #tableView.landscape-actions-visible .my-hand-area {
          bottom: 14px;
          gap: 10px;
        }

        .my-hand-cards {
          min-width: 112px;
          min-height: 82px;
          padding: 10px 10px 6px;
        }

        .my-hand-cards::before {
          inset: 10px 4px 0;
          border-radius: 16px 16px 12px 12px;
        }

        .my-hand-cards .card {
          width: 40px !important;
          height: 58px !important;
          font-size: 18px !important;
          border-radius: 7px !important;
        }

        .my-hand-cards .card:first-child {
          --held-transform: rotate(-7deg) translate(2px, 4px);
          transform: var(--held-transform);
        }

        .my-hand-cards .card:last-child {
          --held-transform: rotate(6deg) translate(-1px, 0);
          transform: var(--held-transform);
          margin-left: -2px;
        }

        .my-hand-nameplate {
          margin-top: 8px;
          min-width: 100px;
          padding: 5px 10px 7px !important;
          border: 1.5px solid rgba(236,178,86,0.38) !important;
          background: linear-gradient(180deg, rgba(10,14,14,0.9), rgba(8,10,10,0.96)) !important;
          box-shadow: 0 5px 18px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,214,128,0.06) !important;
        }

        .my-hand-avatar {
          width: 34px;
          height: 34px;
          margin-top: -20px;
          border: 2px solid rgba(246,188,90,0.9);
          box-shadow: 0 0 0 2px rgba(240,146,42,0.28), 0 0 22px rgba(242,169,62,0.34);
        }

        .my-hand-name { font-size: 11px; font-weight: 800; }
        .my-hand-stack { font-size: 12px; color: #efc777; }
        .my-hand-badges { gap: 3px; min-height: 14px; }
        .my-hand-badges .seat-dealer-dot {
          width: 16px !important;
          height: 16px !important;
          font-size: 8px !important;
          position: static !important;
          top: auto !important;
          right: auto !important;
          border: 1px solid rgba(255,215,140,0.75) !important;
          background: radial-gradient(circle at 30% 30%, #fff4cf, #ebbe71 74%) !important;
          color: #3a2807 !important;
        }
        .my-hand-badges .seat-pos-label {
          font-size: 7px !important;
          font-weight: 800 !important;
          position: static !important;
          top: auto !important;
          right: auto !important;
          padding: 2px 5px !important;
          border-radius: 999px !important;
          background: radial-gradient(circle at 30% 30%, #fff4cf, #ebbe71 74%) !important;
          border: 1px solid rgba(255,215,140,0.75) !important;
          color: #3a2807 !important;
          line-height: 1 !important;
        }

        .action-strip {
          position: absolute;
          left: 12px;
          bottom: 18px;
          z-index: 24;
          width: 148px;
          padding: 8px !important;
          gap: 7px !important;
          display: flex;
          flex-direction: column;
          align-items: stretch;
          background: transparent !important;
          border: none !important;
          border-radius: 0 !important;
          box-shadow: none !important;
        }

        .astrip-btn {
          width: 100%;
          font-size: 11px;
          padding: 8px 10px;
          min-height: 34px;
          border-radius: 999px !important;
          letter-spacing: 0.04em;
        }
        .astrip-fold { background: linear-gradient(180deg, #9e2b2b, #6f1818) !important; color: #ffe8e8 !important; border: 1px solid rgba(255,130,130,0.28); box-shadow: inset 0 0 0 1px rgba(255,190,190,0.12), 0 6px 16px rgba(0,0,0,0.35); }
        .astrip-call { background: linear-gradient(180deg, #21744a, #0f5732) !important; color: #ebfff1 !important; padding: 8px 10px !important; font-size: 13px !important; font-weight: 800 !important; border: 1px solid rgba(120,255,175,0.22); box-shadow: inset 0 0 0 1px rgba(170,255,210,0.12), 0 6px 16px rgba(0,0,0,0.35); min-width: 0; max-width: none; text-align: center; }
        .astrip-raise { background: linear-gradient(180deg, #91671f, #6d4a15) !important; color: #fff5dd !important; border: 1px solid rgba(255,210,125,0.25); box-shadow: inset 0 0 0 1px rgba(255,240,198,0.1), 0 6px 16px rgba(0,0,0,0.35); }
        .astrip-allin { background: linear-gradient(180deg, #473221, #2c1e13) !important; color: #f4ddbd !important; padding: 8px 10px !important; font-size: 12px !important; border: 1px solid rgba(255,193,119,0.24); box-shadow: inset 0 0 0 1px rgba(255,230,188,0.08), 0 6px 16px rgba(0,0,0,0.35); display: block !important; }
        .astrip-raise-group { display: none !important; }
        .astrip-amount { width: 48px; font-size: 12px; }

        .preset-row {
          position: absolute;
          left: 166px;
          bottom: 18px;
          z-index: 24;
          width: 140px;
          display: grid;
          grid-template-columns: 18px 1fr;
          grid-template-areas:
            "slider amount"
            "slider frac1"
            "slider frac2"
            "slider frac3"
            "slider frac4";
          align-items: center;
          background: transparent !important;
          padding: 6px 6px !important;
          gap: 8px 4px !important;
          border: none !important;
          border-radius: 0;
          box-shadow: none !important;
        }
        .preset-slider-wrap {
          grid-area: slider;
          width: 17px;
          height: 100%;
          min-height: 156px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 10px;
          background: rgba(6,10,10,0.72);
          border: 1px solid rgba(236,178,86,0.22);
        }
        .preset-slider-vertical {
          width: 12px;
          height: 104px;
        }
        .preset-amount-wrap {
          grid-area: amount;
          display: flex !important;
          width: 100%;
          align-items: center;
          justify-content: space-between;
          gap: 6px;
          padding: 4px 6px;
          border-radius: 999px;
          background: rgba(12,18,18,0.7);
          border: 1px solid rgba(236,178,86,0.26);
        }
        .preset-amount-label { display: none !important; }
        .preset-amount-input {
          width: 100% !important;
          font-size: 10px !important;
          font-weight: 800 !important;
          padding: 4px 5px !important;
          border-radius: 9px !important;
          background: rgba(6,10,10,0.72) !important;
          border: 1px solid rgba(236,178,86,0.26) !important;
        }
        .preset-chip {
          font-size: 8px;
          text-align: center;
          width: 82%;
          justify-self: center;
          min-height: 20px;
          line-height: 1;
          padding: 3px 0;
          border-radius: 999px;
          color: #e9decb;
          background: rgba(12,18,18,0.7);
          border: 1px solid rgba(236,178,86,0.26);
        }
        .preset-chip[data-fraction="0.33"] { grid-area: frac1; }
        .preset-chip[data-fraction="0.5"] { grid-area: frac2; }
        .preset-chip[data-fraction="0.75"] { grid-area: frac3; }
        .preset-chip[data-fraction="1"] { grid-area: frac4; }

        .seat-bet { font-size: 10px !important; padding: 2px 6px !important; }
        .seat-win-amount { font-size: 13px !important; }
        .seat-rebuy-btn { font-size: 11px !important; padding: 6px 14px !important; }
        .seat-popover { z-index: 30 !important; }
        .table-deal-btn {
          bottom: clamp(78px, 22%, 108px) !important;
          font-size: 14px !important;
          font-weight: 800 !important;
          padding: 9px 24px !important;
          border-radius: 999px !important;
          background: linear-gradient(180deg, #f2bc62, #c68c36) !important;
          box-shadow: 0 7px 20px rgba(0,0,0,0.42), inset 0 0 0 1px rgba(255,233,188,0.2);
        }

        .log-toggle { display: none; }
        .hand-log { display: none; }
      }

      @media (orientation: landscape) and (max-height: 500px) and (min-width: 668px) {
        #tableView { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- ========== LOBBY ========== -->
    <section id="lobby">
      <div class="lobby-card">
        <div class="lobby-brand">
          <h1>POKER NIGHTS</h1>
          <p>Online Texas Hold'em</p>
        </div>

        <!-- Join mode info (shown when ?table= is present) -->
        <div id="joinInfo" class="lobby-join-info hidden">
          <span class="info-name" id="joinTableName">Loading table...</span>
          <span class="info-detail" id="joinTableDetail"></span>
        </div>

        <form class="lobby-form" id="lobbyForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="lobbyName">Your Name</label>
            <input class="form-input" id="lobbyName" type="text" placeholder="Enter your name" required maxlength="30" />
          </div>

          <!-- Create-mode fields -->
          <div id="createFields">
            <div class="form-group" style="margin-bottom:16px">
              <label class="form-label" for="lobbyTableName">Table Name</label>
              <input class="form-input" id="lobbyTableName" type="text" placeholder="Auto-generated" maxlength="40" />
            </div>

            <div class="form-row" style="margin-bottom:16px">
              <div class="form-group">
                <label class="form-label" for="lobbySB">Small Blind</label>
                <input class="form-input" id="lobbySB" type="number" min="0.1" step="0.1" value="1" />
              </div>
              <div class="form-group">
                <label class="form-label" for="lobbyBB">Big Blind</label>
                <input class="form-input" id="lobbyBB" type="number" min="0.2" step="0.1" value="2" />
              </div>
            </div>

            <div class="form-row" style="margin-bottom:16px">
              <div class="form-group">
                <label class="form-label" for="lobbyStack">Starting Stack</label>
                <input class="form-input" id="lobbyStack" type="number" min="1" step="1" value="200" />
              </div>
              <div class="form-group">
                <label class="form-label" for="lobbySeats">Max Seats</label>
                <select class="form-input" id="lobbySeats">
                  <option value="2">2</option>
                  <option value="4">4</option>
                  <option value="6" selected>6</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </div>
            </div>
          </div>

          <button class="btn btn-primary" id="lobbySubmit" type="submit">Create Table</button>
        </form>

        <p class="lobby-status" id="lobbyStatus"></p>
      </div>
    </section>

    <!-- ========== TABLE VIEW ========== -->
    <section id="tableView" class="hidden">
      <header class="top-bar" id="topBar">
        <div class="top-bar-left">
          <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Menu">☰</button>
          <span class="top-bar-title" id="tbTitle"></span>
          <div class="top-bar-meta">
            <span class="meta-badge" id="tbBlinds"></span>
            <span class="meta-badge" id="tbPlayers"></span>
          </div>
        </div>
        <div class="top-bar-actions">
          <div class="connection-dot" id="connDot" title="Connection status"></div>
          <button class="top-btn" id="copyLinkBtn" type="button">Copy Link</button>
          <button class="top-btn" id="removeBotsBtn" type="button" style="display:none">Remove Bots</button>
          <button class="top-btn" id="leaveBtn" type="button" style="color:var(--red)">Leave</button>
        </div>
      </header>
      <button class="landscape-bar-toggle hidden" id="landscapeBarToggle" type="button" aria-label="Show controls" aria-expanded="false">▼</button>
      <div class="table-boot-overlay hidden" id="tableBootOverlay" aria-live="polite" aria-hidden="true">
        <div class="table-boot-spinner" aria-hidden="true"></div>
        <div class="table-boot-label" id="tableBootLabel">Loading Table...</div>
      </div>

      <div class="config-overlay hidden" id="configOverlay">
        <div class="config-backdrop" id="configBackdrop"></div>
        <div class="config-panel" id="configPanel">
          <div class="config-header">
            <h3>Settings</h3>
            <button class="config-close" id="configClose" type="button">✕</button>
          </div>

          <div class="config-tabs">
            <button class="config-tab active" data-tab="game" type="button">Game</button>
            <button class="config-tab" data-tab="prefs" type="button">Preferences</button>
          </div>

          <div class="config-body" id="configTabGame">
            <label class="config-field">
              <span>Small Blind</span>
              <input class="config-input" id="cfgSB" type="number" min="0.01" step="0.01" />
            </label>
            <label class="config-field">
              <span>Big Blind</span>
              <input class="config-input" id="cfgBB" type="number" min="0.01" step="0.01" />
            </label>

            <div class="config-toggle-row">
              <span>Auto Deal Next Hand</span>
              <div class="config-toggle-group">
                <button class="config-toggle-opt active" id="cfgAutoDealYes" type="button">Yes</button>
                <button class="config-toggle-opt" id="cfgAutoDealNo" type="button">No</button>
              </div>
            </div>

            <div class="config-toggle-row">
              <span>Showdown Time</span>
              <div class="config-toggle-group">
                <button class="config-toggle-opt" data-showdown="3" type="button">Fast (3s)</button>
                <button class="config-toggle-opt active" data-showdown="5" type="button">Normal (5s)</button>
                <button class="config-toggle-opt" data-showdown="9" type="button">Slow (9s)</button>
              </div>
            </div>

            <label class="config-field">
              <span>Decision Time Limit (seconds)</span>
              <input class="config-input" id="cfgTurnTime" type="number" min="10" max="120" step="5" value="25" />
            </label>

            <button class="config-save-btn" id="cfgSaveGame" type="button">Save Changes</button>
          </div>

          <div class="config-body hidden" id="configTabPrefs">
            <div class="config-toggle-row">
              <span>Sound Effects</span>
              <div class="config-toggle-group">
                <button class="config-toggle-opt active" id="cfgSoundOn" type="button">On</button>
                <button class="config-toggle-opt" id="cfgSoundOff" type="button">Off</button>
              </div>
            </div>

            <div class="config-toggle-row">
              <span>Show Hand Log</span>
              <div class="config-toggle-group">
                <button class="config-toggle-opt active" id="cfgLogOn" type="button">Show</button>
                <button class="config-toggle-opt" id="cfgLogOff" type="button">Hide</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="table-area">
        <div class="table-surface" id="tableSurface">
          <div class="dealer-deck" id="dealerDeck" aria-hidden="true"></div>
          <div class="deal-fx-layer" id="dealFxLayer" aria-hidden="true"></div>
          <div class="action-announce" id="actionAnnouncement" aria-live="polite" aria-atomic="true">
            <span class="action-announce-actor" id="actionAnnouncementActor"></span>
            <span class="action-announce-text" id="actionAnnouncementText"></span>
          </div>
          <div class="table-center">
            <div class="street-label" id="streetLabel">WAITING</div>
            <div class="pot-display" id="potDisplay" data-state="idle">
              <span class="pot-label">Pot</span>
              <div class="pot-stack-art" id="potStackArt" aria-hidden="true"></div>
              <span class="pot-amount" id="potAmount">$0</span>
            </div>
            <div class="board-cards" id="boardCards"></div>
            <div class="win-reason" id="winReason"></div>
          </div>
          <div class="seats-layer" id="seatsLayer"></div>
          <button class="table-deal-btn hidden" id="startHandBtn" type="button">Deal</button>
        </div>
      </div>

      <div class="my-hand-area" id="myHandArea">
        <div class="my-hand-cards" id="myHandCards"></div>
        <div class="my-hand-nameplate" id="myHandNameplate">
          <div class="my-hand-avatar"></div>
          <div class="my-hand-name" id="myHandName"></div>
          <div class="my-hand-stack" id="myHandStack"></div>
          <div class="my-hand-badges" id="myHandBadges"></div>
        </div>
      </div>

      <div class="action-strip hidden" id="actionStrip">
        <button class="astrip-btn astrip-fold" id="foldBtn" type="button">Fold</button>
        <button class="astrip-btn astrip-call" id="callBtn" type="button">Check</button>
        <div class="astrip-raise-group">
          <input class="astrip-slider" id="betSlider" type="range" min="0" max="1000" value="0" step="1" />
          <input class="astrip-amount" id="betAmount" type="number" min="0" step="0.1" value="0" />
        </div>
        <button class="astrip-btn astrip-raise" id="betRaiseBtn" type="button">Bet</button>
        <button class="astrip-btn astrip-allin" id="allInBtn" type="button">All-in</button>
      </div>

      <div class="preset-row hidden" id="presetRow">
        <div class="preset-slider-wrap">
          <input class="preset-slider-vertical" id="betSliderQuick" type="range" min="0" max="1000" value="0" step="1" />
        </div>
        <div class="preset-amount-wrap">
          <span class="preset-amount-label" id="presetAmountLabel">Bet $</span>
          <input class="preset-amount-input" id="betAmountQuick" type="number" min="0" step="0.1" value="0" inputmode="decimal" />
        </div>
        <button class="preset-chip" type="button" data-fraction="0.33">⅓</button>
        <button class="preset-chip" type="button" data-fraction="0.5">½</button>
        <button class="preset-chip" type="button" data-fraction="0.75">¾</button>
        <button class="preset-chip" type="button" data-fraction="1">Pot</button>
      </div>

      <button class="log-toggle" id="logToggle" type="button">Hand Log ▲</button>
      <div class="hand-log" id="handLog">
        <div class="hand-log-inner" id="handLogInner"></div>
      </div>
    </section>

    <div class="utility-fab-row">
      <button class="voice-fab hidden" id="voiceFab" type="button" aria-label="Voice chat" aria-pressed="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 15.25a3.76 3.76 0 0 0 3.75-3.75V7.75a3.75 3.75 0 0 0-7.5 0v3.75A3.76 3.76 0 0 0 12 15.25Zm6.25-3.75a.75.75 0 0 0-1.5 0 4.75 4.75 0 0 1-9.5 0 .75.75 0 0 0-1.5 0 6.2 6.2 0 0 0 5.5 6.17v2.08H9.5a.75.75 0 0 0 0 1.5h5a.75.75 0 0 0 0-1.5h-1.75v-2.08a6.2 6.2 0 0 0 5.5-6.17Z"/>
        </svg>
        <span class="voice-fab-status hidden" id="voiceFabDot"></span>
      </button>

      <button class="chat-fab hidden" id="chatFab" type="button" aria-label="Open chat" aria-expanded="false">
        Chat
        <span class="chat-fab-badge hidden" id="chatFabBadge">0</span>
      </button>
    </div>

    <div class="chat-panel hidden" id="chatPanel" aria-live="polite">
      <div class="chat-header" id="chatHeader">
        <div>
          <div class="chat-title">Table Chat</div>
          <div class="chat-subtitle">Recent table chat</div>
        </div>
        <button class="chat-close" id="chatClose" type="button" aria-label="Close chat">✕</button>
      </div>
      <div class="chat-list" id="chatList">
        <div class="chat-empty" id="chatEmpty">Say hello to the table. Recent messages stay with this table so late joiners can catch up.</div>
      </div>
      <form class="chat-compose" id="chatForm">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="180" rows="2"></textarea>
          <button class="chat-send" id="chatSend" type="submit" aria-label="Send message"><span aria-hidden="true">→</span></button>
        </div>
      </form>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div class="voice-audio-rack" id="voiceAudioRack" aria-hidden="true"></div>

    <script src="https://unpkg.com/@daily-co/daily-js@0.87.0/dist/daily.js"></script>
    <script type="module" src="./online/table_app.js?v=93"></script>
  </body>
</html>
